theme = "overrides"

[icons.vcs]
enabled = true
icon = ""

[icons.mime]
enabled = true
directory = "🖿"
rust = "🦀"
python = "🐍"
go = ""
json = ""



[editor.inline-blame]
# Show inline blame on specific lines (default: "never")
# Options: "cursor", "all", "never"
show = "cursor-line"
# Format string for blame display
# Available placeholders: {author}, {commit}, {time-ago}, {title}
format = "{author} • {time-ago} • {title}"
# Auto-fetch blame information (default: false)
auto-fetch = false


[icons.gutter]
# added    = " "
# modified = " "
# removed  = " "

[icons.diagnostic]
error = ""
warning = ""
info = ""
hint = ""

[editor.gradient-borders]
enable = true
thickness = 1
direction = "vertical"
start-color = "#dc8a78" # Dark Turquoise
end-color = "#1e66f5"   # Royal Blue
animation-speed = 0

[editor.notifications.border]
enable = true


[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·"

[icons.kind]
enabled = true
function = "󰡱 "
# method = "󰆧"
# variable = "󰀫"

# [editor.icons.kind]
# function = { glyph = "󰊕", color = "#A6E3A1" }

[editor.notifications.emojis]
info = "💡"
warning = "⚠️"
error = "❌"
success = "✅"

[editor.cmdline]
style = "popup"
use-full-height = true

[editor.cmdline.icons]
search = "  "
general = "  "
command = "  "

[editor.notifications]
enable = true
style = "popup"
position = "top-right"
default-timeout = 1000 # Set to 3 seconds if that's what you intended
padding = 0            # NEW: content padding

[editor.notifications.shadow]
enable = false # NEW: drop shadow
offset-x = 0
offset-y = 0

[editor.bufferline]
render-mode = "always"
separator = "|"

[editor]
rainbow-brackets = true
max-panel-width = 120
max-panel-height = 120
welcome-screen=true
#welcome-screen-config = { text = "GJ",font="small", start-color = "#FFC100", end-color = "#FFC900"}
picker-symbol = "👻 "
rounded-corners = true
ruler-char = ""         # Use "┊" and then in the theme, set the following "ui.virtual.ruler" = { fg = "ruler_color"}

line-number = "relative"
rulers = [80]
gutters = ["diff", "spacer", "diagnostics", "line-numbers", "spacer"]
undercurl = true
mouse = true
color-modes = true                                                    # this will enable the  modes highlighting in  the status line
cursorline = true
cursorcolumn = true
auto-format = false
true-color = true
completion-replace = true
end-of-line-diagnostics = "disable"

[editor.cursor-shape]
insert = "block"
normal = "block"
select = "underline"


[editor.file-picker]
hidden = false      # enables ignoring hidden files
parents = true      # enables reading ignore files from parent directories
ignore = true       # enables reading .ignore files
git-ignore = true   #enables reading .gitignore files
git-global = true
git-exclude = true
hide-preview = true

[editor.statusline]
left = ["spinner", "file-name", "function-name", "file-modification-indicator"]
# center = ["diagnostics", "workspace-diagnostics"]
center = ["diagnostics"]
right = [
  "register",
  "position",
  "primary-selection-length",
  "selections",
  "file-encoding",
  "file-indent-style",
  "file-line-ending",
  "position-percentage",
  "file-type",
  "spacer",
]
separator = "│"
diagnostics = ["warning", "error"]
workspace-diagnostics = ["warning", "error"]


[editor.inline-diagnostics]
# Minimum severity to show a diagnostic on the primary cursor's line.
# Note that `cursor-line` diagnostics are hidden in insert mode.
cursor-line = "disable"


[editor.indent-guides]
render = false
# character = "|" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'
'<' = '>'

[editor.lsp]
display-inlay-hints = false
display-messages = true
display-signature-help-docs = true
display-color-swatches = true
color-swatches-string = "◆"
signature-help-position = "above"
auto-document-highlight = true


[editor.soft-wrap]
enable = true

[keys.select]
C-x = ["yank_main_selection_to_clipboard", "delete_selection"]
C-c = "yank_to_clipboard"


[keys.normal]
H = "@vgld"
g = { a = "code_action_picker", o = "goto_last_accessed_file", h = "changed_file_picker", z = "extend_to_file_end", d = [
  "vsplit",
  "goto_definition",
] }
tab = "rotate_view"
S-tab = "rotate_view_reverse"
C-p = "file_picker"
C-x = ["yank_main_selection_to_clipboard", "delete_selection"]
C-c = "yank_to_clipboard"
C-v = "paste_primary_clipboard_after"
C-b = ["buffer_picker"]
C-q = ["wonly"]
C-d = [
  "move_prev_word_start",
  "move_next_word_end",
  "search_selection",
  "extend_search_next",
]
C-f = "global_search"
G = "file_picker_in_current_buffer_directory"
C-z = "join_selections"
S = [":buffer-close"]
ret = ["goto_word"]
X = ["extend_line_up"]
P = "toggle_comments"
C-S-right = "swap_view_right"
C-S-left = "swap_view_left"
C-S-down = "swap_view_down"
C-S-up = "swap_view_up"
S-right = ":bnext"
S-left = ":bprev"
esc = ["collapse_selection", "keep_primary_selection"]
V = ["rotate_selections_backward", "extend_to_line_start"]
D = ["ensure_selections_forward", "extend_to_line_end"]
x = "extend_line"
C-y = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file',
  ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]
C-n = "select_next_sibling"


[keys.insert]
C-space = "completion"
S-tab = "unindent"
C-z = "undo"
C-r = "redo"
C-n = "move_line_down"
C-p = "move_line_up"
C-a = "goto_line_start"
C-e = "goto_line_end"
C-v = "paste_clipboard_before"
S-right = ":bnext"
S-left = ":bprev"

[keys.normal.space]
l = "local_search_grep"
L = "local_search_fuzzy"
e = "file_explorer_in_current_directory"
E = "file_explorer_in_current_buffer_directory"

