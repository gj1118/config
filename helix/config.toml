#  this seems to be a nice resource for keybindings 
#  https://github.com/matejc/helper_scripts/blob/71b0040640da989afa5c618e879ca2d3de263d9d/dotfiles/helix.nix#L166
theme = "overrides"

[icons.vcs]
enabled = true
icon = ""

[icons.mime]
enabled = true
directory = "🖿"
rust = "🦀"
python = "🐍"
go=""
json=""


[editor.cmdline]
style = "popup"
use-full-height = true
show-icons= true

[editor.cmdline.icons]
search = "󰶚  "    # For search commands (/,?)
command = "  "    # For command mode (:)
shell = "⚡"      # For shell commands (!)
general = "💬"   # For other prompts


[icons.gutter]
# added    = " "
# modified = " "
# removed  = " "

[icons.diagnostic]
error = ""
warning = ""
info = ""
hint = ""

[editor.gradient-borders]
enable = true
thickness = 1    # Thin borders work best with rounded corners
direction = "horizontal"
start-color = "#6A5ACD"
end-color = "#9370DB"


[editor.notifications]
enable = true              # Enable notification system
style = "popup"            # "popup" (noice-style) or "statusline" (traditional)
position = "top-right"     # Position: "top-right", "top-left", "bottom-right", "bottom-left"
max-width = 60             # Maximum width for notification popups
max-height = 1            # Maximum height for notification popups
default-timeout = 5000     # Default timeout in milliseconds (0 = no timeout)
show-icons = false  # Show notification type icons
show-emojis = true         # Show notification type emojis
max-history = 100          # Maximum notifications to keep in history

# Border configuration
[editor.notifications.border]
enable = false             # Show borders around notifications
width = 1                  # Border width
radius = 1                 # Corner radius (0 for square corners)

# Customize notification icons
[editor.notifications.icons]
info = " "
warning = " "
error = " "
success = " "


# Customize notification emojis
[editor.notifications.emojis]
info = " "
warning = " "
error = " "
success = " "


[editor.whitespace.characters]
space = "·"
nbsp = "⍽"
nnbsp = "␣"
tab = "→"
newline = "⏎"
tabpad = "·"

[icons.kind]
enabled=true
# function = "󰊕"
# method = "󰆧"
# variable = "󰀫"


[editor.bufferline]
render-mode = "multiple"
separator = "|"

[editor]
rainbow-brackets= true
max-panel-width=120
max-panel-height=120
welcome-screen= true
rounded-corners= true
#bufferline = "multiple"
line-number = "relative"
rulers= [120]
gutters = ["diff","spacer", "diagnostics", "line-numbers", "spacer"]
undercurl = true
mouse = true
color-modes = true                                          # this will enable the  modes highlighting in  the status line
cursorline = true
cursorcolumn = true
auto-format = false
true-color = true
completion-replace = true
end-of-line-diagnostics = "hint"

[editor.cursor-shape]
insert = "block"
normal = "block"
select = "underline"


[editor.file-picker]
hidden = false     # enables ignoring hidden files
parents = true     # enables reading ignore files from parent directories
ignore = true      # enables reading .ignore files
git-ignore = true  #enables reading .gitignore files
git-global = true
git-exclude = true
hide-preview = true

[editor.inline-blame]
# Show inline blame on specific lines (default: "never")
# Options: "cursor-line", "all-lines", "never"
show = "cursor-line"

# Format string for blame display
# Available placeholders: {author}, {commit}, {time-ago}, {title}
format = "{author} • {time-ago} • {title}"

# Auto-fetch blame information (default: false)
auto-fetch = false



[editor.statusline]
left = [
  "mode",
  "spinner",
  "version-control",
  "read-only-indicator",
  "file-name",
  "file-modification-indicator",
]
# center = ["diagnostics", "workspace-diagnostics"]
center = ["diagnostics"]
right = [
  "register",
  "position",
  "primary-selection-length",
  "selections",
  "file-encoding",
  "file-indent-style",
  "file-line-ending",
  "position-percentage",
  "file-type",
  "spacer"
]
separator = "│"

diagnostics = ["warning", "error"]
workspace-diagnostics = ["warning", "error"]




[editor.inline-diagnostics]
# Minimum severity to show a diagnostic on the primary cursor's line.
# Note that `cursor-line` diagnostics are hidden in insert mode.
cursor-line = "error"


[editor.indent-guides]
render = false
# character = "|" # Some characters that work well: "▏", "┆", "┊", "⸽"
skip-levels = 1

[editor.auto-pairs]
'(' = ')'
'{' = '}'
'[' = ']'
'"' = '"'
'`' = '`'
'<' = '>'

[editor.lsp]
display-inlay-hints = false
display-messages = true
display-signature-help-docs = true
display-color-swatches = true
color-swatches-string = "◆"


[editor.soft-wrap]
enable = true

[keys.select]
C-x = ["yank_main_selection_to_clipboard", "delete_selection"]
C-c = "yank_main_selection_to_clipboard"


[keys.normal]
g = { a = "code_action_picker", o = "goto_last_accessed_file", h = "changed_file_picker" }
tab = "rotate_view"
S-tab = "rotate_view_reverse"
C-p = "file_picker"
C-x = ["yank_main_selection_to_clipboard", "delete_selection"]
C-c = "yank_main_selection_to_clipboard"
C-v = "paste_primary_clipboard_after"
C-a = "goto_line_start"
C-e = "goto_line_end"
C-q = ["wonly"]
C-d = [
  "move_prev_word_start",
  "move_next_word_end",
  "search_selection",
  "extend_search_next",
]
C-f = "global_search"
G = "file_picker_in_current_buffer_directory"
R = [":reload"]
C-z = "join_selections"
S = [":buffer-close"]
X = ["extend_line_up"]
P = "toggle_comments"
C-S-right = "swap_view_right"
C-S-left= "swap_view_left"
C-S-down = "swap_view_down"
C-S-up= "swap_view_up"
S-right = ":bnext"
S-left = ":bprev"
"*" = [
  "move_char_right",
  "move_prev_word_start",
  "move_next_word_end",
  "search_selection",
  "search_next",
]
esc = ["collapse_selection", "keep_primary_selection"]
H = ["unindent"]
L = ["indent"]
V = ["rotate_selections_backward", "extend_to_line_start"]
D = ["ensure_selections_forward", "extend_to_line_end"]
x = "extend_line"
C-y = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file',
  ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
]

[keys.insert]
C-space = "completion"
S-tab = "unindent"
C-z = "undo"
C-r = "redo"
C-n = "move_line_down"
C-p = "move_line_up"
C-a = "goto_line_start"
C-e = "goto_line_end"
C-v = "paste_clipboard_before"
S-right = ":bnext"
S-left = ":bprev"

[keys.normal.space]
q = ":bc"
Q = ":bco"
"w" = ":w"
"!" = ":q!"
l = "local_search_grep"
L = "local_search_fuzzy"
o = ":reload-all"
e = "file_explorer_in_current_directory"
E = "file_explorer_in_current_buffer_directory"
H = ["vsplit", "goto_definition"]
G = [
    ":write-all",
    ":insert-output lazygit >/dev/tty",
    ":redraw",
    ":reload-all"
]


# B = ":pipe-to tmux split-window -v helix-git-blame"
# H = ":sh helix-open-in-gh"

[keys.normal.";"]
b = ":sh helix-wezterm.sh blame"
c = ":sh helix-wezterm.sh check"
e = ":sh helix-wezterm.sh explorer"
f = ":sh helix-wezterm.sh fzf"
g = ":sh helix-wezterm.sh lazygit"
o = ":sh helix-wezterm.sh open"
r = ":sh helix-wezterm.sh run"
s = ":sh helix-wezterm.sh test_single"
t = ":sh helix-wezterm.sh test_all"


