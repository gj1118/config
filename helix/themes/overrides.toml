"inherits" = "catppuccin_mocha"
"ui.background" = "transparent"
"ui.bufferline.background" = { "bg" = "transparent"}
"ui.bufferline" = { fg = "inactive_tab_colors"}
"ui.bufferline.active" = { fg = "active_tab_foreground", bg = "active_tab_background" }
"variable.other.member" = "teal"
# this is actually the default but Helix master hasn't synced the catppuccin changes yet
"function.macro" = "rosewater"
"ui.linenr" = { fg = "line_numbers" }  # Subtle gray for normal line numbers
"ui.linenr.selected" = { fg = "selected_line_color", modifiers = ["bold"] } 


"ui.cursor.match" = { "bg" = "#6C6999", "fg" = "#212121"}
"ui.menu.selected" = { fg = "dark", bg = "yellow" }
"ui.cursor.primary.normal" = { fg = "base", bg = "mauve" }

"ui.cursor.primary.insert" = { "bg" = "cursor_insert_bg_color", "fg" = "dark"}
# "ui.background.inactive"={"bg"="inactive_tab_color"}

# "ui.gutter" = { "bg" = "transparent"}

rainbow=["#FFD700","#DA70D6", "#179FFF"]

[palette]
dark = "#111111"
line_heightlight_col_higlight = "#1e2030"
line_numbers = "#9399b2"
window_color = "#484a4d"
inactive_tab_colors = "#ccd0da"
active_tab_foreground="#f6c177"
active_tab_background="#26233a"
cursor_normal_bg ="#d7827e"
selected_line_color="#f5c2e7"
cursor_insert_bg_color="#eed49f"
mauve = "#cba6f7"

